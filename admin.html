<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Login -->
  <div class="admin-login-page" id="loginPage">
    <div class="admin-login-box">
      <h2>Admin Login</h2>
      <div class="store-label" id="loginStoreName">Loading store...</div>
      <form id="loginForm">
        <input type="password" id="loginPassword" placeholder="Enter admin password" required autocomplete="current-password">
        <button type="submit">Login</button>
      </form>
      <div class="admin-login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="admin-layout" id="dashboard" style="display:none;">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-header">
        <div class="s-logo" id="sidebarLogo"></div>
        <div class="s-store" id="sidebarStoreId"></div>
      </div>
      <nav class="admin-sidebar-nav" id="sidebarNav">
        <button class="active" data-tab="info"><i class="fas fa-store"></i> Store Info</button>
        <button data-tab="banners"><i class="fas fa-images"></i> Hero Banners</button>
        <button data-tab="categories"><i class="fas fa-tags"></i> Categories</button>
        <button data-tab="products"><i class="fas fa-utensils"></i> Products</button>
        <button data-tab="social"><i class="fas fa-share-alt"></i> Social Media</button>
      </nav>
      <div class="admin-sidebar-footer">
        <a id="viewStoreLink" href="#" target="_blank"><i class="fas fa-external-link-alt"></i> View Store</a>
        <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 id="topbarTitle">Store Info</h1>
        <span class="admin-save-status" id="saveStatus"></span>
      </div>
      <div class="admin-mobile-tabs" id="mobileTabs">
        <button class="active" data-tab="info">Info</button>
        <button data-tab="banners">Banners</button>
        <button data-tab="categories">Categories</button>
        <button data-tab="products">Products</button>
        <button data-tab="social">Social</button>
      </div>

      <div class="admin-content" id="adminContent"></div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-box" id="productModalBox"></div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/drive-url.js"></script>
  <script>
  (function() {
    'use strict';

    var adminState = { storeId: null, sheetId: null, password: null, data: null, store: null };
    var _saveTimer = null;
    var currentTab = 'info';
    var DEFAULT_IMG = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPj/HwADBwIAMCbHYQAAAABJRU5ErkJggg==';

    function showToast(msg, type) {
      type = type || 'info';
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      requestAnimationFrame(function() { t.classList.add('show'); });
      setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 400); }, 3500);
    }

    function setStatus(text, type) {
      var el = document.getElementById('saveStatus');
      el.textContent = text;
      el.className = 'admin-save-status ' + (type || '');
      if (!text) el.className = 'admin-save-status';
    }

    function scheduleAutoSave(key, value) {
      clearTimeout(_saveTimer);
      setStatus('Saving...', 'saving');
      _saveTimer = setTimeout(async function() {
        try {
          await API.saveSetting(adminState.sheetId, key, value, adminState.password);
          setStatus('Saved ✅', 'saved');
          setTimeout(function() { setStatus(''); }, 3000);
        } catch(e) {
          setStatus('Error ❌', 'error');
          showToast('Save failed: ' + (e.message || 'Unknown error'), 'error');
        }
      }, 1500);
    }

    function esc(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    /* --- Init --- */
    var storeId = new URLSearchParams(location.search).get('store');
    if (!storeId) {
      document.getElementById('loginPage').querySelector('h2').textContent = 'Error';
      document.getElementById('loginStoreName').textContent = 'No store ID in URL';
      return;
    }

    /* Check session */
    var session = sessionStorage.getItem('admin_' + storeId);
    if (session) {
      try {
        var s = JSON.parse(session);
        adminState = s;
        loadDashboard();
      } catch(e) {
        showLogin();
      }
    } else {
      showLogin();
    }

    async function showLogin() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      try {
        var store = await API.getStore(storeId);
        if (store.error) throw new Error('not found');
        adminState.store = store;
        document.getElementById('loginStoreName').textContent = store.store_name || storeId;
      } catch(e) {
        document.getElementById('loginStoreName').textContent = 'Store not found';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var pw = document.getElementById('loginPassword').value;
      document.getElementById('loginError').textContent = '';
      try {
        var store = adminState.store || await API.getStore(storeId);
        if (store.admin_password !== pw) {
          document.getElementById('loginError').textContent = 'Incorrect password';
          return;
        }
        adminState.storeId = storeId;
        adminState.sheetId = store.sheet_id;
        adminState.password = pw;
        adminState.store = store;
        sessionStorage.setItem('admin_' + storeId, JSON.stringify(adminState));
        loadDashboard();
      } catch(e) {
        document.getElementById('loginError').textContent = 'Login failed';
      }
    });

    async function loadDashboard() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';

      document.getElementById('viewStoreLink').href = 'index.html?store=' + storeId;
      document.getElementById('sidebarStoreId').textContent = 'ID: ' + storeId;

      var s = adminState.store;
      var logoUrl = convertDriveUrl(adminState.data ? (adminState.data.settings||{}).logo_url : null, 'w100');
      if (!adminState.data) logoUrl = '';
      document.getElementById('sidebarLogo').innerHTML = (logoUrl ? '<img src="'+logoUrl+'" onerror="this.style.display=\'none\'">' : '') + '<span>' + esc(s.store_name || storeId) + '</span>';

      try {
        var data = await API.getAllStoreData(adminState.sheetId);
        adminState.data = data;
        settings = data.settings || {};
        var lUrl = convertDriveUrl(settings.logo_url, 'w100');
        document.getElementById('sidebarLogo').innerHTML = (lUrl ? '<img src="'+lUrl+'" onerror="this.style.display=\'none\'">' : '') + '<span>' + esc(settings.store_name || s.store_name || storeId) + '</span>';
        renderTab(currentTab);
      } catch(e) {
        showToast('Failed to load store data', 'error');
      }
    }

    /* --- Tabs --- */
    var tabTitles = { info: 'Store Info', banners: 'Hero Banners', categories: 'Categories', products: 'Products', social: 'Social Media' };

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('topbarTitle').textContent = tabTitles[tab] || tab;
      document.querySelectorAll('#sidebarNav button').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
      document.querySelectorAll('#mobileTabs button').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
      renderTab(tab);
    }

    document.querySelectorAll('#sidebarNav button, #mobileTabs button').forEach(function(btn) {
      btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
      sessionStorage.removeItem('admin_' + storeId);
      location.reload();
    });

    /* --- Render Tabs --- */
    var settings = {};

    function renderTab(tab) {
      if (!adminState.data) return;
      settings = adminState.data.settings || {};
      var el = document.getElementById('adminContent');

      if (tab === 'info') renderInfo(el);
      else if (tab === 'banners') renderBanners(el);
      else if (tab === 'categories') renderCategories(el);
      else if (tab === 'products') renderProducts(el);
      else if (tab === 'social') renderSocial(el);
    }

    /* --- TAB: Info --- */
    function renderInfo(el) {
      var driveHelp = '<details class="drive-instructions"><summary>📸 How to add images from Google Drive</summary><ol><li>Go to drive.google.com</li><li>Upload your image file</li><li>Right-click the file → Share</li><li>Set to "Anyone with the link" → Viewer → Copy link</li><li>Paste the link in the Image URL field</li><li>The system automatically converts it for display ✅</li></ol><p style="margin-top:8px;">Note: You can paste the long share URL — it will work.</p></details>';

      el.innerHTML = '<div class="admin-card"><h3>Basic Information</h3>' +
        fg('Store Name', '<input class="form-input" data-key="store_name" value="' + esc(settings.store_name) + '">') +
        fg('Tagline', '<input class="form-input" data-key="store_tagline" value="' + esc(settings.store_tagline) + '">') +
        fg('Logo URL', '<input class="form-input" data-key="logo_url" value="' + esc(settings.logo_url) + '" placeholder="Google Drive share link">' +
          (settings.logo_url ? '<div style="margin-top:8px;"><img class="form-img-preview" src="' + convertDriveUrl(settings.logo_url, 'w200') + '" onerror="this.style.display=\'none\'"></div>' : '') +
          driveHelp) +
      '</div>' +
      '<div class="admin-card"><h3>Appearance</h3>' +
        '<div class="form-row">' +
          fg('Primary Color', '<div style="display:flex;gap:10px;align-items:center;"><input type="color" class="form-input-color" data-key="primary_color" value="' + esc(settings.primary_color || '#c0392b') + '"><span style="font-size:13px;color:var(--color-gray);">' + esc(settings.primary_color || '#c0392b') + '</span></div>') +
          fg('Secondary Color', '<div style="display:flex;gap:10px;align-items:center;"><input type="color" class="form-input-color" data-key="secondary_color" value="' + esc(settings.secondary_color || '#f39c12') + '"><span style="font-size:13px;color:var(--color-gray);">' + esc(settings.secondary_color || '#f39c12') + '</span></div>') +
        '</div>' +
        fg('Currency Symbol', '<input class="form-input" data-key="currency_symbol" value="' + esc(settings.currency_symbol) + '" placeholder="e.g. Rs. $ £">') +
      '</div>' +
      '<div class="admin-card"><h3>Contact</h3>' +
        fg('WhatsApp Number', '<input class="form-input" type="tel" data-key="whatsapp_number" value="' + esc(settings.whatsapp_number) + '" placeholder="923001234567"><div class="hint">Enter number with country code, digits only. Example: 923001234567 (Pakistan) or 14155552671 (USA). No spaces, no +, no dashes.</div>') +
        fg('Phone 1', '<input class="form-input" type="tel" data-key="phone_1" value="' + esc(settings.phone_1) + '">') +
        fg('Phone 2', '<input class="form-input" type="tel" data-key="phone_2" value="' + esc(settings.phone_2) + '">') +
        fg('Address', '<textarea class="form-input" data-key="address">' + esc(settings.address) + '</textarea>') +
      '</div>' +
      '<div class="admin-card"><h3>Navigation & Footer</h3>' +
        fg('Nav Link 1 Text', '<input class="form-input" data-key="nav_link_1_text" value="' + esc(settings.nav_link_1_text) + '">') +
        fg('Nav Link 2 Text', '<input class="form-input" data-key="nav_link_2_text" value="' + esc(settings.nav_link_2_text) + '">') +
        fg('Nav Link 3 Text', '<input class="form-input" data-key="nav_link_3_text" value="' + esc(settings.nav_link_3_text) + '">') +
        fg('Nav Link 4 Text', '<input class="form-input" data-key="nav_link_4_text" value="' + esc(settings.nav_link_4_text) + '">') +
        fg('Footer Text', '<input class="form-input" data-key="footer_text" value="' + esc(settings.footer_text) + '">') +
      '</div>';

      /* Bind auto-save */
      el.querySelectorAll('[data-key]').forEach(function(input) {
        input.addEventListener('input', function() {
          var key = this.dataset.key;
          var val = this.value;
          if (this.type === 'color') {
            var span = this.parentElement.querySelector('span');
            if (span) span.textContent = val;
          }
          scheduleAutoSave(key, val);
        });
        /* Also save on blur for safety */
        input.addEventListener('change', function() {
          scheduleAutoSave(this.dataset.key, this.value);
        });
      });
    }

    function fg(label, content) {
      return '<div class="form-group"><label>' + label + '</label>' + content + '</div>';
    }

    /* --- TAB: Banners --- */
    function renderBanners(el) {
      var banners = (adminState.data.banners || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
      var html = '<div class="admin-card"><h3>Hero Banners <button class="btn-sm btn-primary-sm" style="float:right;" onclick="window._addBanner()">+ Add Banner</button></h3>';
      if (banners.length === 0) {
        html += '<p style="color:var(--color-gray);text-align:center;padding:32px;">No banners yet. Click "+ Add Banner" to create one.</p>';
      }
      banners.forEach(function(b, i) {
        var isActive = b.is_active === 'TRUE';
        html += '<div class="banner-item" data-bid="' + esc(b.banner_id) + '">' +
          '<div class="banner-item-header">' +
            '<span style="color:var(--color-gray);font-size:13px;">#' + (i+1) + '</span>' +
            '<span class="b-title">' + esc(b.title_line_1 || '') + ' ' + esc(b.title_line_2 || '') + '</span>' +
            '<div class="toggle-wrap"><div class="toggle' + (isActive ? ' on' : '') + '" onclick="window._toggleBanner(this,\'' + esc(b.banner_id) + '\')"></div></div>' +
            '<div class="b-actions">' +
              '<button class="btn-sm btn-ghost-sm" onclick="window._moveBanner(\'' + esc(b.banner_id) + '\',-1)"><i class="fas fa-arrow-up"></i></button>' +
              '<button class="btn-sm btn-ghost-sm" onclick="window._moveBanner(\'' + esc(b.banner_id) + '\',1)"><i class="fas fa-arrow-down"></i></button>' +
              '<button class="btn-sm btn-primary-sm" onclick="window._editBanner(\'' + esc(b.banner_id) + '\')">Edit</button>' +
              '<button class="btn-sm btn-danger-sm" onclick="window._deleteBanner(\'' + esc(b.banner_id) + '\')">Delete</button>' +
            '</div>' +
          '</div>' +
          '<div class="banner-edit-form" id="bef_' + esc(b.banner_id) + '">' +
            '<div class="form-row">' +
              fg('Title Line 1', '<input class="form-input" id="be_t1_' + esc(b.banner_id) + '" value="' + esc(b.title_line_1) + '">') +
              fg('Title Line 2', '<input class="form-input" id="be_t2_' + esc(b.banner_id) + '" value="' + esc(b.title_line_2) + '">') +
            '</div>' +
            fg('Subtitle', '<input class="form-input" id="be_sub_' + esc(b.banner_id) + '" value="' + esc(b.subtitle) + '">') +
            fg('Description', '<textarea class="form-input" id="be_desc_' + esc(b.banner_id) + '">' + esc(b.description) + '</textarea>') +
            fg('CTA Text', '<input class="form-input" id="be_cta_' + esc(b.banner_id) + '" value="' + esc(b.cta_text) + '">') +
            fg('Background Image URL', '<input class="form-input" id="be_bgimg_' + esc(b.banner_id) + '" value="' + esc(b.bg_image_url) + '">' +
              (b.bg_image_url ? '<img src="' + convertDriveUrl(b.bg_image_url, 'w400') + '" style="max-width:300px;border-radius:8px;margin-top:8px;" onerror="this.style.display=\'none\'">' : '')) +
            '<div class="form-row">' +
              fg('Background Color', '<input type="color" class="form-input-color" id="be_bgcol_' + esc(b.banner_id) + '" value="' + esc(b.bg_color || '#1a0000') + '">') +
              fg('Text Color', '<input type="color" class="form-input-color" id="be_txtcol_' + esc(b.banner_id) + '" value="' + esc(b.text_color || '#ffffff') + '">') +
            '</div>' +
            '<button class="btn btn-primary" style="margin-top:12px;" onclick="window._saveBanner(\'' + esc(b.banner_id) + '\')">Save Banner</button>' +
          '</div>' +
        '</div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }

    window._editBanner = function(bid) {
      var form = document.getElementById('bef_' + bid);
      if (form) form.classList.toggle('open');
    };

    window._saveBanner = async function(bid) {
      var banner = {
        banner_id: bid,
        title_line_1: document.getElementById('be_t1_' + bid).value,
        title_line_2: document.getElementById('be_t2_' + bid).value,
        subtitle: document.getElementById('be_sub_' + bid).value,
        description: document.getElementById('be_desc_' + bid).value,
        cta_text: document.getElementById('be_cta_' + bid).value,
        bg_image_url: document.getElementById('be_bgimg_' + bid).value,
        bg_color: document.getElementById('be_bgcol_' + bid).value,
        text_color: document.getElementById('be_txtcol_' + bid).value,
      };
      /* preserve existing values */
      var existing = (adminState.data.banners || []).find(function(b) { return b.banner_id === bid; });
      if (existing) {
        banner.is_active = existing.is_active;
        banner.display_order = existing.display_order;
        banner.featured_image_url = existing.featured_image_url;
      }
      try {
        setStatus('Saving...', 'saving');
        await API.saveBanner(adminState.sheetId, banner, adminState.password);
        await reloadAndRender();
        setStatus('Saved ✅', 'saved');
        setTimeout(function() { setStatus(''); }, 3000);
        showToast('Banner saved', 'success');
      } catch(e) {
        setStatus('Error ❌', 'error');
        showToast('Failed to save banner', 'error');
      }
    };

    window._toggleBanner = async function(toggleEl, bid) {
      var banners = adminState.data.banners || [];
      var b = banners.find(function(x) { return x.banner_id === bid; });
      if (!b) return;
      b.is_active = b.is_active === 'TRUE' ? 'FALSE' : 'TRUE';
      toggleEl.classList.toggle('on', b.is_active === 'TRUE');
      try {
        await API.saveBanner(adminState.sheetId, b, adminState.password);
        showToast(b.is_active === 'TRUE' ? 'Banner activated' : 'Banner deactivated', 'success');
      } catch(e) { showToast('Failed to update', 'error'); }
    };

    window._deleteBanner = async function(bid) {
      if (!confirm('Delete this banner?')) return;
      try {
        await API.deleteBanner(adminState.sheetId, bid, adminState.password);
        await reloadAndRender();
        showToast('Banner deleted', 'success');
      } catch(e) { showToast('Failed to delete', 'error'); }
    };

    window._moveBanner = async function(bid, dir) {
      var banners = (adminState.data.banners || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
      var idx = banners.findIndex(function(b) { return b.banner_id === bid; });
      if (idx < 0) return;
      var newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= banners.length) return;
      var tmpOrder = banners[idx].display_order;
      banners[idx].display_order = banners[newIdx].display_order;
      banners[newIdx].display_order = tmpOrder;
      try {
        await API.saveBanner(adminState.sheetId, banners[idx], adminState.password);
        await API.saveBanner(adminState.sheetId, banners[newIdx], adminState.password);
        await reloadAndRender();
      } catch(e) { showToast('Failed to reorder', 'error'); }
    };

    window._addBanner = function() {
      var bid = 'ban-' + Date.now();
      var banners = adminState.data.banners || [];
      var maxOrder = banners.reduce(function(m, b) { return Math.max(m, parseInt(b.display_order) || 0); }, 0);
      banners.push({
        banner_id: bid,
        title_line_1: 'Your Title',
        title_line_2: 'Goes Here',
        subtitle: 'SUBTITLE',
        description: 'Add a description here',
        cta_text: 'Order Now',
        bg_image_url: '',
        bg_color: '#1a0000',
        text_color: '#ffffff',
        featured_image_url: '',
        is_active: 'FALSE',
        display_order: maxOrder + 1
      });
      adminState.data.banners = banners;
      renderBanners(document.getElementById('adminContent'));
      /* Auto open edit */
      setTimeout(function() { window._editBanner(bid); }, 50);
    };

    /* --- TAB: Categories --- */
    function renderCategories(el) {
      var cats = (adminState.data.categories || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
      var html = '<div class="admin-card"><h3>Categories <button class="btn-sm btn-primary-sm" style="float:right;" onclick="window._addCategory()">+ Add Category</button></h3>';
      if (cats.length === 0) {
        html += '<p style="color:var(--color-gray);text-align:center;padding:32px;">No categories yet.</p>';
      }
      html += '<table class="cat-table"><thead><tr><th>Icon</th><th>Name</th><th>Order</th><th>Active</th><th></th></tr></thead><tbody>';
      cats.forEach(function(c) {
        var isActive = c.is_active === 'TRUE';
        html += '<tr data-cid="' + esc(c.category_id) + '">' +
          '<td><input value="' + esc(c.icon || '') + '" data-field="icon" style="width:50px;text-align:center;"></td>' +
          '<td><input value="' + esc(c.name || '') + '" data-field="name"></td>' +
          '<td><input type="number" value="' + (c.display_order || 0) + '" data-field="display_order" style="width:70px;"></td>' +
          '<td><div class="toggle' + (isActive ? ' on' : '') + '" data-field="is_active" data-val="' + c.is_active + '"></div></td>' +
          '<td><button class="btn-sm btn-danger-sm" onclick="window._deleteCategory(\'' + esc(c.category_id) + '\')">Delete</button></td>' +
        '</tr>';
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;

      /* Bind auto-save */
      el.querySelectorAll('.cat-table input').forEach(function(input) {
        input.addEventListener('change', function() {
          var row = this.closest('tr');
          var cid = row.dataset.cid;
          var field = this.dataset.field;
          var cat = (adminState.data.categories || []).find(function(c) { return c.category_id === cid; });
          if (!cat) return;
          cat[field] = this.value;
          saveCat(cat);
        });
      });
      el.querySelectorAll('.cat-table .toggle').forEach(function(toggle) {
        toggle.addEventListener('click', function() {
          var row = this.closest('tr');
          var cid = row.dataset.cid;
          var cat = (adminState.data.categories || []).find(function(c) { return c.category_id === cid; });
          if (!cat) return;
          cat.is_active = cat.is_active === 'TRUE' ? 'FALSE' : 'TRUE';
          this.classList.toggle('on', cat.is_active === 'TRUE');
          saveCat(cat);
        });
      });
    }

    async function saveCat(cat) {
      try {
        setStatus('Saving...', 'saving');
        await API.saveCategory(adminState.sheetId, cat, adminState.password);
        setStatus('Saved ✅', 'saved');
        setTimeout(function() { setStatus(''); }, 3000);
      } catch(e) {
        setStatus('Error ❌', 'error');
        showToast('Failed to save category', 'error');
      }
    }

    window._addCategory = function() {
      var cats = adminState.data.categories || [];
      var maxOrder = cats.reduce(function(m, c) { return Math.max(m, parseInt(c.display_order) || 0); }, 0);
      cats.push({
        category_id: 'cat-' + Date.now(),
        icon: '🍽️',
        name: 'New Category',
        display_order: maxOrder + 1,
        is_active: 'TRUE'
      });
      adminState.data.categories = cats;
      renderCategories(document.getElementById('adminContent'));
    };

    window._deleteCategory = async function(cid) {
      if (!confirm('Delete this category?')) return;
      try {
        await API.deleteCategory(adminState.sheetId, cid, adminState.password);
        await reloadAndRender();
        showToast('Category deleted', 'success');
      } catch(e) { showToast('Failed to delete', 'error'); }
    };

    /* --- TAB: Products --- */
    var productSearch = '';
    var productCatFilter = '';

    function renderProducts(el) {
      var cats = (adminState.data.categories || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
      var prods = (adminState.data.products || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });

      if (productSearch) {
        var q = productSearch.toLowerCase();
        prods = prods.filter(function(p) { return (p.name||'').toLowerCase().includes(q); });
      }
      if (productCatFilter) {
        prods = prods.filter(function(p) { return p.category === productCatFilter || p.category_name === productCatFilter; });
      }

      var html = '<div class="admin-card"><h3>Products <button class="btn-sm btn-primary-sm" style="float:right;" onclick="window._addProduct()">+ Add Product</button></h3>' +
        '<div class="product-toolbar">' +
          '<input type="text" id="productSearch" placeholder="Search products..." value="' + esc(productSearch) + '">' +
          '<select id="productCatFilter"><option value="">All Categories</option>' +
            cats.map(function(c) { return '<option value="' + esc(c.category_id || c.name) + '"' + (productCatFilter === (c.category_id || c.name) ? ' selected' : '') + '>' + esc(c.name) + '</option>'; }).join('') +
          '</select>' +
        '</div>';

      if (prods.length === 0) {
        html += '<p style="color:var(--color-gray);text-align:center;padding:32px;">No products found.</p>';
      }

      html += '<div style="overflow-x:auto;"><table class="product-list-table"><thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Available</th><th>Featured</th><th></th></tr></thead><tbody>';
      prods.forEach(function(p) {
        html += '<tr>' +
          '<td><img src="' + convertDriveUrl(p.image_url, 'w100') + '" onerror="this.src=\'' + DEFAULT_IMG + '\'"></td>' +
          '<td><strong>' + esc(p.name) + '</strong></td>' +
          '<td>' + esc(p.category_name || p.category || '-') + '</td>' +
          '<td>' + esc(settings.currency_symbol || 'Rs.') + ' ' + Number(p.price).toLocaleString() + '</td>' +
          '<td>' + (p.is_available === 'TRUE' ? '<span style="color:#16a34a;">✓</span>' : '<span style="color:#dc2626;">✗</span>') + '</td>' +
          '<td>' + (p.is_featured === 'TRUE' ? '⭐' : '-') + '</td>' +
          '<td><button class="btn-sm btn-primary-sm" onclick="window._editProduct(\'' + esc(p.product_id || p.id) + '\')">Edit</button> <button class="btn-sm btn-danger-sm" onclick="window._deleteProduct(\'' + esc(p.product_id || p.id) + '\')">Delete</button></td>' +
        '</tr>';
      });
      html += '</tbody></table></div></div>';
      el.innerHTML = html;

      document.getElementById('productSearch').addEventListener('input', function() {
        productSearch = this.value;
        renderProducts(el);
      });
      document.getElementById('productCatFilter').addEventListener('change', function() {
        productCatFilter = this.value;
        renderProducts(el);
      });
    }

    window._addProduct = function() { showProductModal(null); };
    window._editProduct = function(pid) { showProductModal(pid); };

    function showProductModal(pid) {
      var cats = (adminState.data.categories || []).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
      var p = pid ? (adminState.data.products || []).find(function(x) { return (x.product_id || x.id) === pid; }) : null;
      var isNew = !p;
      p = p || {};

      var driveHelp = '<details class="drive-instructions"><summary>📸 How to add images from Google Drive</summary><ol><li>Go to drive.google.com</li><li>Upload your image file</li><li>Right-click → Share → "Anyone with the link" → Viewer → Copy link</li><li>Paste the link below</li></ol></details>';

      var html = '<h2>' + (isNew ? 'Add Product' : 'Edit Product') + '</h2>' +
        fg('Product ID', '<input class="form-input" id="pm_id" value="' + esc(p.product_id || p.id || '') + '" ' + (isNew ? 'placeholder="Auto-generated if empty"' : 'readonly style="background:#f9fafb;"') + '>') +
        fg('Name', '<input class="form-input" id="pm_name" value="' + esc(p.name) + '">') +
        fg('Description', '<textarea class="form-input" id="pm_desc">' + esc(p.description) + '</textarea>') +
        '<div class="form-row">' +
          fg('Price', '<input type="number" class="form-input" id="pm_price" value="' + (p.price || '') + '">') +
          fg('Original Price', '<input type="number" class="form-input" id="pm_orig" value="' + (p.original_price || '') + '" placeholder="For strikethrough">') +
        '</div>' +
        fg('Category', '<select class="form-input" id="pm_cat"><option value="">-- Select --</option>' +
          cats.map(function(c) { return '<option value="' + esc(c.category_id || c.name) + '"' + ((p.category || '') === (c.category_id || c.name) ? ' selected' : '') + '>' + esc(c.name) + '</option>'; }).join('') +
        '</select>') +
        fg('Image URL', '<input class="form-input" id="pm_img" value="' + esc(p.image_url) + '" oninput="document.getElementById(\'pm_preview\').src=convertDriveUrl(this.value)">' +
          '<div style="margin-top:8px;"><img id="pm_preview" src="' + convertDriveUrl(p.image_url) + '" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--color-border);" onerror="this.src=\'' + DEFAULT_IMG + '\'"></div>' +
          driveHelp) +
        '<div class="form-row">' +
          fg('Badge Text', '<input class="form-input" id="pm_badge" value="' + esc(p.badge_text) + '" placeholder="e.g. NEW, BEST">') +
          fg('Display Order', '<input type="number" class="form-input" id="pm_order" value="' + (p.display_order || 0) + '">') +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Is Available</label><div class="toggle' + ((p.is_available !== 'FALSE') ? ' on' : '') + '" id="pm_avail"></div></div>' +
          '<div class="form-group"><label>Is Featured</label><div class="toggle' + (p.is_featured === 'TRUE' ? ' on' : '') + '" id="pm_feat"></div></div>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" onclick="window._closeProductModal()">Cancel</button>' +
          '<button class="btn btn-primary" onclick="window._saveProduct()">Save Product</button>' +
        '</div>';

      document.getElementById('productModalBox').innerHTML = html;
      document.getElementById('productModal').classList.add('open');

      document.getElementById('pm_avail').addEventListener('click', function() { this.classList.toggle('on'); });
      document.getElementById('pm_feat').addEventListener('click', function() { this.classList.toggle('on'); });
    }

    window._closeProductModal = function() {
      document.getElementById('productModal').classList.remove('open');
    };

    window._saveProduct = async function() {
      var idVal = document.getElementById('pm_id').value.trim();
      var product = {
        product_id: idVal || 'prod-' + Date.now(),
        name: document.getElementById('pm_name').value.trim(),
        description: document.getElementById('pm_desc').value.trim(),
        price: Number(document.getElementById('pm_price').value) || 0,
        original_price: Number(document.getElementById('pm_orig').value) || '',
        category: document.getElementById('pm_cat').value,
        image_url: document.getElementById('pm_img').value.trim(),
        badge_text: document.getElementById('pm_badge').value.trim(),
        display_order: parseInt(document.getElementById('pm_order').value) || 0,
        is_available: document.getElementById('pm_avail').classList.contains('on') ? 'TRUE' : 'FALSE',
        is_featured: document.getElementById('pm_feat').classList.contains('on') ? 'TRUE' : 'FALSE',
      };

      if (!product.name) { showToast('Product name is required', 'error'); return; }
      if (product.price <= 0) { showToast('Price must be greater than 0', 'error'); return; }

      /* Resolve category_name */
      var cat = (adminState.data.categories || []).find(function(c) { return (c.category_id || c.name) === product.category; });
      if (cat) product.category_name = cat.name;

      try {
        setStatus('Saving...', 'saving');
        await API.saveProduct(adminState.sheetId, product, adminState.password);
        window._closeProductModal();
        await reloadAndRender();
        setStatus('Saved ✅', 'saved');
        setTimeout(function() { setStatus(''); }, 3000);
        showToast('Product saved', 'success');
      } catch(e) {
        setStatus('Error ❌', 'error');
        showToast('Failed to save product: ' + (e.message || ''), 'error');
      }
    };

    window._deleteProduct = async function(pid) {
      if (!confirm('Delete this product?')) return;
      try {
        await API.deleteProduct(adminState.sheetId, pid, adminState.password);
        await reloadAndRender();
        showToast('Product deleted', 'success');
      } catch(e) { showToast('Failed to delete', 'error'); }
    };

    /* --- TAB: Social --- */
    function renderSocial(el) {
      var socials = [
        { key: 'facebook_url', icon: '🔵', label: 'Facebook URL', placeholder: 'https://facebook.com/yourpage' },
        { key: 'instagram_url', icon: '📸', label: 'Instagram URL', placeholder: 'https://instagram.com/yourpage' },
        { key: 'twitter_url', icon: '🐦', label: 'Twitter/X URL', placeholder: 'https://twitter.com/yourpage' },
        { key: 'tiktok_url', icon: '🎵', label: 'TikTok URL', placeholder: 'https://tiktok.com/@yourpage' },
      ];

      var html = '<div class="admin-card"><h3>Social Media Links</h3><div class="social-grid">';
      socials.forEach(function(s) {
        html += '<div class="social-item">' +
          '<span class="social-icon">' + s.icon + '</span>' +
          '<div style="flex:1;">' +
            '<label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px;">' + s.label + '</label>' +
            '<input class="form-input" data-key="' + s.key + '" value="' + esc(settings[s.key] || '') + '" placeholder="' + s.placeholder + '">' +
          '</div>' +
        '</div>';
      });
      html += '</div></div>';
      el.innerHTML = html;

      el.querySelectorAll('[data-key]').forEach(function(input) {
        input.addEventListener('blur', function() {
          scheduleAutoSave(this.dataset.key, this.value);
        });
      });
    }

    /* --- Reload & Re-render --- */
    async function reloadAndRender() {
      try {
        var data = await API.getAllStoreData(adminState.sheetId);
        adminState.data = data;
        settings = data.settings || {};
        renderTab(currentTab);
      } catch(e) {
        showToast('Failed to reload data', 'error');
      }
    }

  })();
  </script>
</body>
</html>
