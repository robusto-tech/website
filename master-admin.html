<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Login -->
  <div class="master-login-page" id="masterLogin">
    <div class="master-login-box">
      <h1>Master Admin</h1>
      <p>Enter the master password to continue</p>
      <form id="masterLoginForm">
        <input type="password" id="masterPw" placeholder="Password" required autocomplete="current-password">
        <button type="submit">Unlock Dashboard</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="master-dashboard" id="masterDash" style="display:none;">
    <div class="master-topbar">
      <h1>Master Admin</h1>
      <button id="masterLogout"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="master-stats" id="masterStats"></div>
    <div class="master-stores">
      <div class="master-stores-header">
        <h2>All Stores</h2>
        <button class="btn-add-store" onclick="window._openCreateModal()">+ Create New Store</button>
      </div>
      <div id="storeList"></div>
    </div>
  </div>

  <!-- Create Store Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-box" style="max-width:540px;">
      <h2>Create New Store</h2>
      <div class="wizard-steps" id="wizardSteps">
        <div class="wizard-step active"><div class="step-num">1</div></div>
        <div class="wizard-step"><div class="step-line"></div><div class="step-num">2</div></div>
        <div class="wizard-step"><div class="step-line"></div><div class="step-num">3</div></div>
      </div>

      <div class="wizard-panel active" id="wiz1">
        <div class="form-group">
          <label>Store Name</label>
          <input class="form-input" id="wizName" placeholder="e.g. Pizza Palace" oninput="window._updateSlug()">
        </div>
        <div class="form-group">
          <label>Store ID (auto-generated)</label>
          <input class="form-input" id="wizSlug" readonly style="background:#f9fafb;font-family:monospace;">
        </div>
        <div style="text-align:right;"><button class="btn btn-primary" onclick="window._wizNext(2)">Next →</button></div>
      </div>

      <div class="wizard-panel" id="wiz2">
        <div class="form-group">
          <label>Google Sheet ID</label>
          <input class="form-input" id="wizSheet" placeholder="Paste the Sheet ID here">
        </div>
        <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.7;color:#92400e;">
          <strong>How to find your Sheet ID:</strong><br>
          Open your Google Sheet. Look at the URL:<br>
          <code style="background:#fff;padding:4px 8px;border-radius:4px;font-size:12px;">docs.google.com/spreadsheets/d/<strong>[COPY THIS PART]</strong>/edit</code><br><br>
          ⚠️ Make sure the sheet is shared: <strong>Anyone with the link → Viewer</strong>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <button class="btn btn-secondary" onclick="window._wizNext(1)">← Back</button>
          <button class="btn btn-primary" onclick="window._wizNext(3)">Next →</button>
        </div>
      </div>

      <div class="wizard-panel" id="wiz3">
        <div class="form-group">
          <label>Admin Password for this store</label>
          <input type="password" class="form-input" id="wizPw" placeholder="Choose a strong password">
        </div>
        <div class="wizard-summary" id="wizSummary"></div>
        <div style="display:flex;justify-content:space-between;">
          <button class="btn btn-secondary" onclick="window._wizNext(2)">← Back</button>
          <button class="btn btn-primary" id="wizCreateBtn" onclick="window._createStore()">✓ Create Store</button>
        </div>
      </div>

      <div id="wizSuccess" style="display:none;"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script>
  (function() {
    'use strict';

    var stores = [];

    function showToast(msg, type) {
      type = type || 'info';
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      requestAnimationFrame(function() { t.classList.add('show'); });
      setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 400); }, 3500);
    }

    function esc(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    /* --- Login --- */
    if (sessionStorage.getItem('masterAuth')) {
      showDashboard();
    }

    document.getElementById('masterLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var pw = document.getElementById('masterPw').value;
      if (pw === CONFIG.MASTER_PASSWORD) {
        sessionStorage.setItem('masterAuth', '1');
        showDashboard();
      } else {
        showToast('Incorrect password', 'error');
      }
    });

    document.getElementById('masterLogout').addEventListener('click', function() {
      sessionStorage.removeItem('masterAuth');
      location.reload();
    });

    async function showDashboard() {
      document.getElementById('masterLogin').style.display = 'none';
      document.getElementById('masterDash').style.display = 'block';
      await loadStores();
    }

    async function loadStores() {
      try {
        var res = await API.getStores();
        stores = Array.isArray(res) ? res : (res.stores || []);
        renderStats();
        renderStoreList();
      } catch(e) {
        showToast('Failed to load stores', 'error');
      }
    }

    function renderStats() {
      var total = stores.length;
      var active = stores.filter(function(s) { return s.is_active === 'TRUE'; }).length;
      var inactive = total - active;
      document.getElementById('masterStats').innerHTML =
        '<div class="stat-card"><div class="stat-num">' + total + '</div><div class="stat-label">Total Stores</div></div>' +
        '<div class="stat-card"><div class="stat-num" style="color:#16a34a;">' + active + '</div><div class="stat-label">Active</div></div>' +
        '<div class="stat-card"><div class="stat-num" style="color:#dc2626;">' + inactive + '</div><div class="stat-label">Inactive</div></div>';
    }

    function renderStoreList() {
      var html = '';
      if (stores.length === 0) {
        html = '<div style="text-align:center;padding:60px;color:var(--color-gray);">No stores yet. Click "+ Create New Store" to get started.</div>';
      }
      stores.forEach(function(s) {
        var isActive = s.is_active === 'TRUE';
        var customerUrl = location.origin + location.pathname.replace('master-admin.html', 'index.html') + '?store=' + s.store_id;
        var adminUrl = location.origin + location.pathname.replace('master-admin.html', 'admin.html') + '?store=' + s.store_id;
        html += '<div class="store-card">' +
          '<div class="store-card-info">' +
            '<h3>' + esc(s.store_name) + '</h3>' +
            '<div class="store-id">' + esc(s.store_id) + '</div>' +
          '</div>' +
          '<span class="store-card-status ' + (isActive ? 'active' : 'inactive') + '">' + (isActive ? '🟢 Active' : '🔴 Inactive') + '</span>' +
          '<div class="store-card-actions">' +
            '<button class="btn-sm btn-primary-sm" onclick="window.open(\'' + customerUrl + '\',\'_blank\')"><i class="fas fa-eye"></i> Preview</button>' +
            '<button class="btn-sm btn-ghost-sm" onclick="window.open(\'' + adminUrl + '\',\'_blank\')"><i class="fas fa-cog"></i> Admin</button>' +
            '<button class="btn-sm btn-ghost-sm" onclick="window._copyUrl(\'' + customerUrl + '\',this)"><i class="fas fa-copy"></i> Copy URL</button>' +
            '<button class="btn-sm btn-ghost-sm" onclick="window._toggleStore(\'' + esc(s.store_id) + '\',' + !isActive + ')">' + (isActive ? '⏸ Deactivate' : '▶ Activate') + '</button>' +
          '</div>' +
        '</div>';
      });
      document.getElementById('storeList').innerHTML = html;
    }

    window._copyUrl = function(url, btn) {
      navigator.clipboard.writeText(url).then(function() {
        var orig = btn.innerHTML
