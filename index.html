<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Apps Script Web App</title>
    <style>
        /* Remove all default browser spacing */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #ffffff;
        }

        /* Force the iframe to occupy 100% of the screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbwYngPtci1VmGHzVJA63kN9wtz_C0PGsx8XFuP13_3yAlnFYpOHUTXGLKSy4JWYOGJH/exec"

    </iframe>

</body>
</html>
