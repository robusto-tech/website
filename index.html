<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Error Page (hidden by default) -->
  <div class="error-page" id="errorPage" style="display:none;">
    <div>
      <h1>Store Not Found</h1>
      <p>Please check the URL and make sure you have the correct store link.</p>
    </div>
  </div>

  <!-- Loading Skeleton -->
  <div id="loadingSkeleton" style="margin-top:72px; padding:32px; max-width:1280px; margin-left:auto; margin-right:auto;">
    <div style="height:400px; margin-bottom:40px; border-radius:16px;" class="skeleton"></div>
    <div style="height:32px; width:300px; margin:0 auto 24px;" class="skeleton skeleton-text w60"></div>
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px;">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <!-- Main Site (hidden until loaded) -->
  <div id="mainSite" style="display:none;">

    <!-- Header -->
    <header class="site-header" id="siteHeader">
      <div class="header-inner">
        <a href="#" class="header-logo" id="headerLogo">
          <span id="headerLogoText">STORE</span>
        </a>
        <nav class="header-nav" id="headerNav"></nav>
        <div class="header-right">
          <button class="cart-btn" id="cartBtn" aria-label="Open cart">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartBadge">0</span>
          </button>
          <a href="#products" class="order-now-btn">Order Now</a>
          <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </header>

    <!-- Mobile Nav -->
    <nav class="mobile-nav" id="mobileNav"></nav>

    <!-- Hero Slider -->
    <section class="hero-section" id="heroSection">
      <div id="heroSlides"></div>
      <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- Feature Section -->
    <section class="feature-section" id="featureSection">
      <span class="feature-deco">🍟</span>
      <span class="feature-deco">🍅</span>
      <span class="feature-deco">🌿</span>
      <h2 class="feature-heading" id="featureHeading">Loading...</h2>
      <p class="feature-sub">Order online and get it delivered hot to your door</p>
      <div class="feature-items" id="featureItems"></div>
      <a href="#products" class="feature-cta">Order Now</a>
    </section>

    <!-- Category Filter -->
    <section class="category-section" id="categorySection">
      <div class="category-pills" id="categoryPills"></div>
    </section>

    <!-- Product Grid -->
    <section class="products-section" id="products">
      <h2 class="products-heading">Popular Items</h2>
      <div class="product-grid" id="productGrid"></div>
    </section>

    <!-- Footer -->
    <footer class="site-footer" id="siteFooter"></footer>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cartDrawer">
      <div class="cart-drawer-header">
        <h2>Your Order</h2>
        <button class="cart-drawer-close" id="cartClose" aria-label="Close cart"><i class="fas fa-times"></i></button>
      </div>
      <div class="cart-drawer-items" id="cartItems"></div>
      <div class="cart-drawer-footer" id="cartFooter"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/drive-url.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/hero-slider.js"></script>
  <script>
  (function() {
    'use strict';

    /* --- Globals --- */
    var storeId = new URLSearchParams(location.search).get('store');
    var storeData = null;
    var settings = {};
    var banners = [];
    var categories = [];
    var products = [];
    var activeCategory = 'all';
    var slider = null;
    var DEFAULT_IMG = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPj/HwADBwIAMCbHYQAAAABJRU5ErkJggg==';

    /* --- Toast --- */
    function showToast(msg, type) {
      type = type || 'info';
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      requestAnimationFrame(function() { t.classList.add('show'); });
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { t.remove(); }, 400);
      }, 3500);
    }

    /* --- Init --- */
    if (!storeId) {
      document.getElementById('loadingSkeleton').style.display = 'none';
      document.getElementById('errorPage').style.display = 'flex';
      document.getElementById('errorPage').querySelector('h1').textContent = 'No Store Specified';
      document.getElementById('errorPage').querySelector('p').textContent = 'Please use a valid store link, e.g. index.html?store=your-store';
      return;
    }

    Cart.init(storeId);
    loadStore();

    async function loadStore() {
      try {
        var store = await API.getStore(storeId);
        if (store.error || store.is_active !== 'TRUE') {
          throw new Error('not found');
        }
        storeData = store;
        document.title = store.store_name || 'Store';

        var data = await API.getAllStoreData(store.sheet_id);
        settings = data.settings || {};
        banners = (data.banners || []).filter(function(b) { return b.is_active === 'TRUE'; }).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
        categories = (data.categories || []).filter(function(c) { return c.is_active === 'TRUE'; }).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });
        products = (data.products || []).filter(function(p) { return p.is_available === 'TRUE'; }).sort(function(a,b) { return (parseInt(a.display_order)||0) - (parseInt(b.display_order)||0); });

        applyTheme();
        renderHeader();
        renderHero();
        renderFeature();
        renderCategories();
        renderProducts();
        renderFooter();
        setupCart();
        setupScrollHeader();

        document.getElementById('loadingSkeleton').style.display = 'none';
        document.getElementById('mainSite').style.display = 'block';

        if (banners.length > 0) {
          slider = new HeroSlider(document.getElementById('heroSection'));
        }
      } catch(e) {
        document.getElementById('loadingSkeleton').style.display = 'none';
        document.getElementById('errorPage').style.display = 'flex';
      }
    }

    /* --- Theme --- */
    function applyTheme() {
      var r = document.documentElement.style;
      r.setProperty('--color-primary', settings.primary_color || '#c0392b');
      r.setProperty('--color-secondary', settings.secondary_color || '#f39c12');
    }

    /* --- Header --- */
    function renderHeader() {
      var logoUrl = convertDriveUrl(settings.logo_url, 'w200');
      var name = settings.store_name || storeData.store_name || 'Store';
      var logoEl = document.getElementById('headerLogo');

      if (logoUrl) {
        logoEl.innerHTML = '<img src="' + logoUrl + '" alt="Logo" onerror="this.style.display=\'none\'"><span>' + esc(name) + '</span>';
      } else {
        logoEl.innerHTML = '<span>' + esc(name) + '</span>';
      }

      var navLinks = [];
      for (var i = 1; i <= 4; i++) {
        var t = settings['nav_link_' + i + '_text'];
        if (t) navLinks.push(t);
      }
      var navHTML = navLinks.map(function(t) { return '<a href="#products">' + esc(t) + '</a>'; }).join('');
      document.getElementById('headerNav').innerHTML = navHTML;
      document.getElementById('mobileNav').innerHTML = navHTML;

      /* Hamburger */
      document.getElementById('hamburger').addEventListener('click', function() {
        this.classList.toggle('active');
        document.getElementById('mobileNav').classList.toggle('open');
      });
      document.querySelectorAll('.mobile-nav a').forEach(function(a) {
        a.addEventListener('click', function() {
          document.getElementById('hamburger').classList.remove('active');
          document.getElementById('mobileNav').classList.remove('open');
        });
      });
    }

    function setupScrollHeader() {
      window.addEventListener('scroll', function() {
        document.getElementById('siteHeader').classList.toggle('scrolled', window.scrollY > 50);
      });
    }

    /* --- Hero --- */
    function renderHero() {
      if (banners.length === 0) {
        document.getElementById('heroSection').style.display = 'none';
        return;
      }
      var slidesHTML = '';
      var dotsHTML = '';
      banners.forEach(function(b, idx) {
        var bgStyle = 'background: linear-gradient(135deg, #1a0000 0%, ' + (b.bg_color || '#1a0000') + ' 100%);';
        if (b.bg_image_url) {
          var bgImg = convertDriveUrl(b.bg_image_url, 'w1200');
          bgStyle = '';
        }
        var featuredImg = '';
        if (b.featured_image_url) {
          featuredImg = '<img src="' + convertDriveUrl(b.featured_image_url, 'w600') + '" alt="Food" onerror="this.style.display=\'none\'">';
        } else {
          var featProds = products.filter(function(p) { return p.is_featured === 'TRUE'; });
          if (featProds.length > 0) {
            featuredImg = '<img src="' + convertDriveUrl(featProds[0].image_url, 'w600') + '" alt="' + esc(featProds[0].name) + '" onerror="this.src=\'' + DEFAULT_IMG + '\';this.onerror=null">';
          }
        }

        slidesHTML += '<div class="hero-slide" data-index="' + idx + '">' +
          (b.bg_image_url ? '<div class="hero-slide-bg" style="background-image:url(\'' + convertDriveUrl(b.bg_image_url, 'w1200') + '\')"></div>' : '') +
          '<div class="hero-slide-content" style="' + (b.bg_image_url ? '' : bgStyle) + '">' +
            '<div class="hero-text">' +
              (b.subtitle ? '<span class="hero-subtitle">' + esc(b.subtitle) + '</span>' : '') +
              '<h1 class="hero-title">' +
                '<span class="line1">' + esc(b.title_line_1 || '') + '</span>' +
                '<span class="line2">' + esc(b.title_line_2 || '') + '</span>' +
              '</h1>' +
              (b.description ? '<p class="hero-desc">' + esc(b.description) + '</p>' : '') +
              (b.cta_text ? '<a href="#products" class="hero-cta">' + esc(b.cta_text) + '</a>' : '') +
            '</div>' +
            '<div class="hero-image">' + featuredImg + '</div>' +
          '</div>' +
          '<span class="hero-deco">🍅</span><span class="hero-deco">🌿</span><span class="hero-deco">🍅</span><span class="hero-deco">🌿</span>' +
        '</div>';

        dotsHTML += '<button class="hero-dot" data-index="' + idx + '" tabindex="0" aria-label="Slide ' + (idx+1) + '" aria-selected="false"></button>';
      });

      document.getElementById('heroSlides').innerHTML = slidesHTML;
      document.getElementById('heroDots').innerHTML = dotsHTML;
    }

    /* --- Feature Section --- */
    function renderFeature() {
      document.getElementById('featureHeading').textContent = settings.store_tagline || settings.store_name || 'Our Best Sellers';
      var featured = products.filter(function(p) { return p.is_featured === 'TRUE'; }).slice(0, 3);
      var html = '';
      featured.forEach(function(p) {
        html += '<div class="feature-item">' +
          '<img src="' + convertDriveUrl(p.image_url) + '" alt="' + esc(p.name) + '" onerror="this.src=\'' + DEFAULT_IMG + '\';this.onerror=null">' +
          '<h3>' + esc(p.name) + '</h3>' +
        '</div>';
      });
      if (featured.length === 0) {
        document.getElementById('featureSection').style.display = 'none';
        return;
      }
      document.getElementById('featureItems').innerHTML = html;
    }

    /* --- Categories --- */
    function renderCategories() {
      var html = '<button class="category-pill active" data-cat="all">All</button>';
      categories.forEach(function(c) {
        html += '<button class="category-pill" data-cat="' + esc(c.category_id || c.name) + '">' + (c.icon || '') + ' ' + esc(c.name) + '</button>';
      });
      document.getElementById('categoryPills').innerHTML = html;

      document.querySelectorAll('.category-pill').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.category-pill').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          activeCategory = this.dataset.cat;
          renderProducts();
          document.getElementById('products').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    /* --- Products --- */
    function renderProducts() {
      var filtered = products;
      if (activeCategory !== 'all') {
        filtered = products.filter(function(p) { return p.category === activeCategory || p.category_name === activeCategory; });
      }

      var html = '';
      filtered.forEach(function(p) {
        var isOutOfStock = p.is_available !== 'TRUE';
        var qty = Cart.getQty(p.id || p.product_id);
        var hasOriginal = p.original_price && Number(p.original_price) > Number(p.price);
        var c = settings.currency_symbol || 'Rs.';

        html += '<div class="product-card' + (isOutOfStock ? ' out-of-stock' : '') + '" data-pid="' + esc(p.id || p.product_id) + '">' +
          (p.badge_text ? '<span class="product-card-badge">' + esc(p.badge_text) + '</span>' : '') +
          '<img class="product-card-img" src="' + convertDriveUrl(p.image_url) + '" alt="' + esc(p.name) + '" onerror="this.src=\'' + DEFAULT_IMG + '\';this.onerror=null">' +
          '<div class="product-card-name">' + esc(p.name) + '</div>' +
          '<div class="product-card-desc">' + esc(p.description || '') + '</div>' +
          '<div class="product-card-price">' + c + ' ' + Number(p.price).toLocaleString() +
            (hasOriginal ? '<span class="product-card-original-price">' + c + ' ' + Number(p.original_price).toLocaleString() + '</span>' : '') +
          '</div>';

        if (isOutOfStock) {
          html += '<button class="product-card-add" disabled>Currently Unavailable</button>';
        } else if (qty > 0) {
          html += '<div class="qty-row">' +
            '<button class="qty-btn" onclick="window._cartRemove(\'' + esc(p.id || p.product_id) + '\')">−</button>' +
            '<span class="qty-num">' + qty + '</span>' +
            '<button class="qty-btn" onclick="window._cartAdd(' + JSON.stringify(p).replace(/"/g, '&quot;') + ')">+</button>' +
          '</div>';
        } else {
          html += '<button class="product-card-add" onclick="window._cartAdd(' + JSON.stringify(p).replace(/"/g, '&quot;') + ')">Add to Cart</button>';
        }

        html += '</div>';
      });

      if (filtered.length === 0) {
        html = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--color-gray);font-size:16px;">No items found in this category.</div>';
      }

      document.getElementById('productGrid').innerHTML = html;
    }

    /* Expose cart functions globally for inline onclick */
    window._cartAdd = function(product) {
      Cart.add(product);
      renderProducts();
      renderCartDrawer();
      updateBadge();
      showToast('Added to cart!', 'success');
    };
    window._cartRemove = function(id) {
      Cart.remove(id);
      renderProducts();
      renderCartDrawer();
      updateBadge();
    };

    /* --- Cart --- */
    function setupCart() {
      document.getElementById('cartBtn').addEventListener('click', openCart);
      document.getElementById('cartClose').addEventListener('click', closeCart);
      document.getElementById('cartOverlay').addEventListener('click', closeCart);
      updateBadge();
      renderCartDrawer();
    }

    function openCart() {
      document.getElementById('cartDrawer').classList.add('open');
      document.getElementById('cartOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeCart() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateBadge() {
      var badge = document.getElementById('cartBadge');
      var count = Cart.count();
      badge.textContent = count;
      badge.classList.toggle('visible', count > 0);
    }

    function renderCartDrawer() {
      var items = Cart.items();
      var itemsEl = document.getElementById('cartItems');
      var footerEl = document.getElementById('cartFooter');
      var c = settings.currency_symbol || 'Rs.';

      if (items.length === 0) {
        itemsEl.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty<br>Browse our menu and add some items!</p><button class="cart-empty-btn" onclick="closeCart()">Browse Menu</button></div>';
        footerEl.innerHTML = '';
        return;
      }

      var html = '';
      items.forEach(function(item) {
        html += '<div class="cart-item">' +
          '<img class="cart-item-img" src="' + convertDriveUrl(item.image_url, 'w100') + '" alt="" onerror="this.src=\'' + DEFAULT_IMG + '\';this.onerror=null">' +
          '<div class="cart-item-info">' +
            '<div class="cart-item-name">' + esc(item.name) + '</div>' +
            '<div class="cart-item-price">' + c + ' ' + (item.price * item.qty).toLocaleString() + '</div>' +
          '</div>' +
          '<div class="cart-item-qty">' +
            '<button onclick="window._cartRemove(\'' + esc(item.id) + '\')">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button onclick="window._cartAdd(' + JSON.stringify(item).replace(/"/g, '&quot;') + ')">+</button>' +
          '</div>' +
          '<button class="cart-item-remove" onclick="window._cartDelete(\'' + esc(item.id) + '\')"><i class="fas fa-trash-alt"></i></button>' +
        '</div>';
      });
      itemsEl.innerHTML = html;

      var total = Cart.total();
      footerEl.innerHTML = '<div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-amount">' + c + ' ' + total.toLocaleString() + '</span></div>' +
        '<button class="cart-whatsapp-btn" onclick="window._placeOrder()"><i class="fab fa-whatsapp"></i> Place Order via WhatsApp</button>';
    }

    window._cartDelete = function(id) {
      Cart.deleteItem(id);
      renderProducts();
      renderCartDrawer();
      updateBadge();
    };

    window._placeOrder = function() {
      var items = Cart.items();
      if (items.length === 0) {
        showToast('Your cart is empty!', 'error');
        return;
      }
      openWhatsApp(settings, items);
    };

    /* --- Footer --- */
    function renderFooter() {
      var name = settings.store_name || storeData.store_name || 'Store';
      var logoUrl = convertDriveUrl(settings.logo_url, 'w100');

      var socials = [
        { key: 'facebook_url', icon: 'fa-facebook-f', label: 'Facebook' },
        { key: 'instagram_url', icon: 'fa-instagram', label: 'Instagram' },
        { key: 'twitter_url', icon: 'fa-twitter', label: 'Twitter' },
        { key: 'tiktok_url', icon: 'fa-tiktok', label: 'TikTok' }
      ];

      var socialHTML = socials.filter(function(s) { return settings[s.key]; }).map(function(s) {
        return '<a href="' + esc(settings[s.key]) + '" target="_blank" rel="noopener" aria-label="' + s.label + '"><i class="fab ' + s.icon + '"></i></a>';
      }).join('');

      var html = '<div class="footer-grid">' +
        '<div class="footer-col">' +
          '<div class="footer-logo">' + (logoUrl ? '<img src="' + logoUrl + '" alt="Logo" onerror="this.style.display=\'none\'">' : '') + '<span>' + esc(name) + '</span></div>' +
          '<p class="footer-tagline">' + esc(settings.store_tagline || '') + '</p>' +
        '</div>' +
        '<div class="footer-col">' +
          '<h3>Contact Us</h3>' +
          '<div class="footer-contact">' +
            (settings.address ? '<p><i class="fas fa-map-marker-alt"></i> ' + esc(settings.address) + '</p>' : '') +
            (settings.phone_1 ? '<p><i class="fas fa-phone"></i> ' + esc(settings.phone_1) + '</p>' : '') +
            (settings.phone_2 ? '<p><i class="fas fa-phone"></i> ' + esc(settings.phone_2) + '</p>' : '') +
          '</div>' +
        '</div>' +
        '<div class="footer-col">' +
          '<h3>Follow Us</h3>' +
          '<div class="footer-social">' + (socialHTML || '<span style="color:rgba(255,255,255,0.3);font-size:13px;">No social links set</span>') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="footer-bottom">' + esc(settings.footer_text || '\u00A9 ' + new Date().getFullYear() + ' ' + name + '. All rights reserved.') + '</div>';

      document.getElementById('siteFooter').innerHTML = html;
    }

    /* --- Utility --- */
    function esc(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

  })();
  </script>
</body>
</html>
